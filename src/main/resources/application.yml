spring:
  datasource:
    driverClassName: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:scheduling_tattoo}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        show_sql: true
        format_sql: true
  sql:
    init:
      mode: never
  flyway:
    baseline-on-migrate: true

jwt:
  secret: ${JWT_SECRET:devSecretDevSecretDevSecretDevSecretDevSecretDevSecret123456}
  expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}
